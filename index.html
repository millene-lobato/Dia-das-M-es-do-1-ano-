<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Feliz dia das mães 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="musica" loop>
  <source src="Fico Assim Sem Você" type="audio/mpeg">
</audio>

<button id="playMusic">▶ Tocar música</button>

<div class="container">

  <!-- FOTO -->
  <img src="foto1.jpeg" class="foto">

  <!-- ENVELOPE -->
  <div class="envelope" onclick="abrirCarta()">
    <div class="tampa"></div>
    <div class="corpo"></div>

    <!-- CORAÇÃO -->
    <div class="coracao">❤️</div>

    <!-- CARTA -->
    <div class="carta" id="carta">
      <p>Oi 💕 fiz isso pra você</p>

      <video controls width="200">
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
